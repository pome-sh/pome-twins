name: quickstart-smoke
# The clean-machine quickstart (README): `npx @pome-sh/cli twin start github`
# then the bundled triage agent must reach the twin with env-only auth.
# F-604 broke the old quickstart via agent↔twin disk-path coupling; F-647
# replaced disk probing with env auth — this gate keeps the npx-equivalent
# flow from silently re-breaking. F-647.
on:
  pull_request:
    paths:
      - 'README.md'
      - 'examples/triage-agent/**'
      - 'packages/shared-types/**'
      - 'packages/adapter-claude-sdk/**'
      - 'package.json'
      - 'package-lock.json'
      - 'cli/**'
      - '.github/workflows/quickstart-smoke.yml'
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: quickstart-smoke-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # End-to-end: hermetic auth-token unit test, then build the CLI from this
  # checkout and run `twin start github` — the same in-process boot path the
  # published `npx @pome-sh/cli` front door uses (the twins themselves ride in
  # via the CLI's published @pome-sh/* deps, exactly as they do for an npx
  # user). The agent mints a JWT from the shared TWIN_AUTH_SECRET env, probes
  # the twin's /tools with it in PREFLIGHT mode (POME_PREFLIGHT=1), and exits
  # 0. That path never calls Claude, but the code asserts ANTHROPIC_API_KEY is
  # set, so we pass a throwaway value.
  smoke:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            cli/package-lock.json
            examples/triage-agent/package-lock.json
      # Root install so the example's adapter dep resolves. The example's
      # `file:` adapter dep resolves its own @anthropic-ai/claude-agent-sdk
      # from the workspace node_modules, so the module import in the test
      # succeeds.
      - run: npm ci
      # FDRS-658 — build the adapter's dist BEFORE the example installs. The
      # adapter is dist-only (`files: [dist]`, `exports: ./dist/index.js`, no
      # `src`) and the example consumes it via a `file:` dep that npm packs on
      # install; without a built dist the packed package has nothing to import
      # (`Cannot find module '@pome-sh/adapter-claude-sdk'`). Build must precede
      # the example's `npm ci` so the pack includes dist/.
      - run: npm run build -w @pome-sh/adapter-claude-sdk
      - name: Auth-token unit test
        working-directory: examples/triage-agent
        run: |
          npm ci
          npm test
      # The CLI consumes @pome-sh/* as published versions, but a checkout can
      # use a shared-types feature ahead of its npm release (e.g. a new
      # events.jsonl kind). Pack the workspace packages and point the CLI at the
      # local tarballs before building — the same pre-publish flow cli-ci and the
      # overhead gate use, so "from this checkout" means the checkout's
      # shared-types, not the registry's. Drop this once the consumed
      # shared-types is on npm and the committed cli/package-lock.json resolves it.
      - name: Pack @pome-sh packages and rewrite the CLI onto local tarballs
        run: |
          node scripts/pack-publishable.mjs --out "$RUNNER_TEMP/tarballs"
          node scripts/use-local-pome-tarballs.mjs cli/package.json
      - name: Build the CLI from this checkout
        working-directory: cli
        run: |
          # No committed lockfile for the rewritten tarball manifest; generate
          # one then freeze-install (mirrors cli-ci).
          npm install --package-lock-only --ignore-scripts
          npm ci
          npm run build
      # One secret, shared via env by the twin and the agent — the README's
      # TWIN_AUTH_SECRET flow. (Not a real credential: generated per run,
      # loopback twin, torn down with the job.)
      - name: Generate the shared twin auth secret
        run: echo "TWIN_AUTH_SECRET=$(node -e 'console.log(require("crypto").randomBytes(32).toString("hex"))')" >> "$GITHUB_ENV"
      - name: Start the GitHub twin via the CLI
        run: |
          nohup node cli/dist/src/cli/main.js twin start github > twin.log 2>&1 &
      - name: Wait for twin health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3333/healthz >/dev/null 2>&1; then
              echo "twin ready after ${i} tries"; exit 0
            fi
            sleep 2
          done
          echo "::error::twin health not ready within 120s"
          cat twin.log
          exit 1
      - name: Quickstart preflight (env-secret JWT mint + reach twin)
        working-directory: examples/triage-agent
        env:
          POME_PREFLIGHT: "1"
          # preflight probes the twin only; it never calls Claude in this mode,
          # but index.ts asserts the key is present, so a placeholder suffices.
          ANTHROPIC_API_KEY: "sk-ant-preflight-not-used"
        run: npm start
      - name: Twin logs on failure
        if: failure()
        run: cat twin.log
