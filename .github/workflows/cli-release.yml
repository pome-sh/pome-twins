name: cli-release
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'cli/**'
      - '.github/workflows/cli-release.yml'

concurrency:
  group: cli-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: version PR or publish (@pome-sh/cli)
    runs-on: ubuntu-latest
    permissions:
      contents: write        # push the version branch / tags
      pull-requests: write    # open the "Version Packages" PR
      id-token: write         # npm OIDC Trusted Publishing (provenance)
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      # Keep npm pinned to the GA Trusted Publishing release used by this path.
      # Pinned (not @latest): npm 11.18.0 crashes with "Exit handler never
      # called!" on the OIDC provenance publish path. 11.5.1 is the GA release
      # for trusted publishing and publishes cleanly.
      - name: Install npm with OIDC trusted publishing support
        run: npm install -g npm@11.5.1
      - name: Check package dependencies are published
        id: package-deps
        run: |
          set +e
          npm view @pome-sh/shared-types@0.11.0 version &&
          npm view @pome-sh/sdk@0.5.0 version &&
          npm view @pome-sh/twin-github@0.2.1 version &&
          npm view @pome-sh/twin-slack@0.2.1 version &&
          npm view @pome-sh/twin-stripe@0.2.4 version &&
          npm view @pome-sh/twin-gmail@0.1.0 version
          ready=$?
          set -e
          if [ "$ready" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Skip until package batch is published
        if: steps.package-deps.outputs.ready != 'true'
        run: |
          echo "Skipping CLI release. Publish the packages-v* batch first, then rerun this workflow."
      # The new exact @pome-sh/* versions are published by the package batch
      # first. Regenerate the registry lock from the resolved manifest here,
      # then freeze install so the CLI tarball matches what this job resolved.
      - if: steps.package-deps.outputs.ready == 'true'
        run: |
          # --ignore-scripts on lock-only: prepare/tsc runs before deps exist.
          npm install --package-lock-only --ignore-scripts
          npm ci
      - name: Guard against hard-link tarball (E415)
        if: steps.package-deps.outputs.ready == 'true'
        run: |
          set -euo pipefail
          npm run build
          npm pack --ignore-scripts --pack-destination "$RUNNER_TEMP"
          tgz="$(ls "$RUNNER_TEMP"/pome-sh-cli-*.tgz)"
          # The npm registry rejects tarballs with hard-link entries (E415).
          # Fail here rather than at publish time if any slip in.
          if tar -tvf "$tgz" | grep -qE '^h'; then
            echo "tarball contains hard links — npm registry would reject (E415):"
            tar -tvf "$tgz" | grep -E '^h'
            exit 1
          fi
          echo "E415 hard-link check OK: $tgz"
      # F-724 — last line of defense: never publish (or open a Version PR)
      # from a version base behind npm's published latest.
      - name: CLI version not behind npm latest
        if: steps.package-deps.outputs.ready == 'true'
        working-directory: ${{ github.workspace }}
        run: scripts/check-cli-version-floor.sh
      - name: Changesets — version PR or publish
        if: steps.package-deps.outputs.ready == 'true'
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          cwd: cli
          version: npm run changeset:version
          publish: npm run changeset:publish
          title: "chore(cli): version packages"
          commit: "chore(cli): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
