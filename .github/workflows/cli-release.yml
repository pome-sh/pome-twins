name: cli-release
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'cli/**'
      - '.github/workflows/cli-release.yml'

concurrency:
  group: cli-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: version PR or publish (pome-sh)
    runs-on: ubuntu-latest
    permissions:
      contents: write        # push the version branch / tags
      pull-requests: write    # open the "Version Packages" PR
      id-token: write         # npm OIDC Trusted Publishing (provenance)
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # OIDC Trusted Publishing needs npm >= 11.5.1; Node 22 ships npm 10.
      # Pinned (not @latest): npm 11.18.0 crashes with "Exit handler never
      # called!" on the OIDC provenance publish path. 11.5.1 is the GA release
      # for trusted publishing and publishes cleanly.
      - name: Install npm with OIDC trusted publishing support
        run: npm install -g npm@11.5.1
      - name: Check package dependencies are published
        id: package-deps
        run: |
          set +e
          npm view @pome-sh/shared-types@0.6.0 version &&
          npm view @pome-sh/twin-github@0.1.0 version &&
          npm view @pome-sh/twin-slack@0.1.0 version &&
          npm view @pome-sh/twin-stripe@0.2.0 version
          ready=$?
          set -e
          if [ "$ready" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Skip until package batch is published
        if: steps.package-deps.outputs.ready != 'true'
        run: |
          echo "Skipping CLI release. Publish the packages-v* batch first, then rerun this workflow."
      # --backend=copyfile: bun's default Linux backend hardlinks packages into
      # node_modules; npm publish then packs the bundleDependencies as hard-link
      # tar entries, which the registry rejects (E415 "Hard link is not
      # allowed"). copyfile makes them real files.
      - if: steps.package-deps.outputs.ready == 'true'
        run: bun install --backend=copyfile
      - name: Changesets — version PR or publish
        if: steps.package-deps.outputs.ready == 'true'
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          cwd: cli
          version: bun run changeset:version
          publish: bun run changeset:publish
          title: "chore(cli): version packages"
          commit: "chore(cli): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
