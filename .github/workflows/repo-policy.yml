name: repo-policy

# F-696 — assert protected main policy (PR + review + required checks).
# Live GET .../protection needs Administration:read, which GITHUB_TOKEN cannot
# hold (invalid workflow permission scope). Unit tests always run; live drift
# checks use repo secret REPO_POLICY_TOKEN (fine-grained PAT, Administration:
# Read-only). On PRs without that secret, only the offline validator runs.
on:
  schedule:
    - cron: "41 5 * * 1"
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/ci/assert-repo-policy.sh"
      - "scripts/ci/assert-repo-policy.test.mjs"
      - ".github/workflows/repo-policy.yml"
      - ".github/workflows/dependency-review.yml"
      - ".github/workflows/ci.yml"
      - ".github/workflows/secret-scan.yml"

permissions:
  contents: read

jobs:
  assert:
    name: assert main protection
    # Fork PRs get a read-only token and cannot see base-repo secrets.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Regression-test policy validator
        run: node scripts/ci/assert-repo-policy.test.mjs
      - name: Assert live branch protection
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_POLICY_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [[ -z "${GITHUB_TOKEN:-}" ]]; then
            if [[ "${EVENT_NAME}" == "pull_request" ]]; then
              echo "REPO_POLICY_TOKEN unset — live assert skipped on PR; offline validator tests ran above."
              echo "Maintainers: add a fine-grained PAT (Administration: Read-only) as Actions secret REPO_POLICY_TOKEN for schedule/dispatch drift checks."
              exit 0
            fi
            echo "::error::REPO_POLICY_TOKEN is required for ${EVENT_NAME} drift checks (GITHUB_TOKEN cannot read branch protection)."
            exit 1
          fi
          bash scripts/ci/assert-repo-policy.sh
