name: golden-gate
# FDRS-646 — deterministic golden-scenario gate for the evaluator.
#
# Runs the [D]-only golden fixtures (cli/test/golden/) that assert a CORRECT
# agent scores >= threshold and a WRONG agent scores below it, with the expected
# per-criterion breakdown. Deterministic by design: NO ANTHROPIC_API_KEY /
# OPENAI_API_KEY are provided, so the LLM-judge ([P]) path is never exercised.
on:
  pull_request:
    paths:
      - 'cli/src/evaluator/**'
      - 'cli/test/golden/**'
      - 'cli/scenarios/**'
      - '.github/workflows/golden-gate.yml'
  push:
    branches: [main]
    paths:
      - 'cli/src/evaluator/**'
      - 'cli/test/golden/**'
      - 'cli/scenarios/**'
      - '.github/workflows/golden-gate.yml'
  workflow_dispatch:

concurrency:
  group: golden-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  golden:
    name: ubuntu-latest · deterministic golden gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: cli
    env:
      # Belt-and-suspenders: keep judge keys OUT of the environment so the gate
      # can never accidentally depend on a live LLM.
      ANTHROPIC_API_KEY: ''
      OPENAI_API_KEY: ''
      POME_LLM_API_KEY: ''
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
      - run: node scripts/verify-vendor.mjs
      - run: bun install --frozen-lockfile
      - run: bun run test test/golden/golden-scenario.test.ts
