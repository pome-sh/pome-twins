name: agent-trace-overhead-gate

# FDRS-405 — runs the bundled triage scenario twice (capture on / off),
# accumulates N=100 per-call latency samples from each, and fails the build
# if p99(with − without) > 5ms. Same run also asserts PR/FAQ acceptance #1:
# scenario 01 with a no-adapter agent emits ≥1 LlmCallEvent + ≥1
# TwinHttpEvent (tool_call_id: null) in events.jsonl, and `pome inspect`
# exits 0 with a "Trace health" section.
#
# FDRS-413 adds a second job step that runs scenario 01 against the
# CAS-adapter triage fixture and enforces PR/FAQ acceptance #2: ≥1
# LlmCallEvent + ≥1 TwinHttpEvent with non-null tool_call_id + ≥1
# ToolUseEvent + ≥1 HookEvent(PreToolUse), and `pome inspect` reports the
# CAS adapter layer as present. The resulting trace is uploaded as a build
# artifact so reviewers can eyeball a real adapter run.
#
# Paths filter scopes the gate to changes that could plausibly affect proxy
# latency or events.jsonl shape — the CLI runtime, the in-process
# twin-github runtime, and the CAS adapter package. Doc-only / unrelated
# changes don't pay the CI cost.

on:
  pull_request:
    paths:
      - 'cli/**'
      - 'packages/twin-github/**'
      - 'packages/adapter-claude-sdk/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/agent-trace-overhead-gate.yml'
  push:
    branches: [main]
    paths:
      - 'cli/**'
      - 'packages/twin-github/**'
      - 'packages/adapter-claude-sdk/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/agent-trace-overhead-gate.yml'
  workflow_dispatch:

concurrency:
  group: agent-trace-overhead-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gate:
    name: overhead gate (p99 < 5ms) + PR/FAQ #1 / #2
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      # Repo-root install populates every workspace package plus its devDeps
      # (notably @anthropic-ai/claude-agent-sdk) so the FDRS-413 fixture can
      # resolve `withPome()` + the SDK's `tool()` at runtime, and so the pack
      # step below can build all publishable packages.
      - run: npm ci
      # The CLI consumes the @pome-sh/* packages as published versions, which
      # don't exist on npm before the first release. Pack them locally and
      # point the CLI at the tarballs (deps + transitive overrides).
      - name: Pack @pome-sh packages and rewrite the CLI onto local tarballs
        run: |
          node scripts/pack-publishable.mjs --out "$RUNNER_TEMP/tarballs"
          node scripts/use-local-pome-tarballs.mjs cli/package.json
      - name: Install + build CLI
        working-directory: cli
        run: |
          # No committed cli/package-lock.json until @pome-sh/* are on npm;
          # generate a lockfile from the rewritten manifest then freeze.
          npm install --package-lock-only
          npm ci
          npm run build
      - name: Run agent-trace overhead gate (PR/FAQ #1)
        working-directory: cli
        env:
          # Wired by `cli/scripts/overhead-gate.ts`; defaults match FDRS-405
          # ("N=100, budget 5ms"). Overrideable for local triage runs.
          OVERHEAD_BENCH_N: '100'
          OVERHEAD_BENCH_BUDGET_MS: '5'
        run: npx tsx scripts/overhead-gate.ts
      - name: Run CAS-adapter acceptance gate (PR/FAQ #2)
        working-directory: cli
        env:
          CAS_ACCEPTANCE_ARTIFACT_OUT: ${{ github.workspace }}/cas-adapter-trace
        run: npx tsx scripts/cas-adapter-acceptance.ts
      - name: Upload CAS-adapter trace
        # Always upload, even on failure — the trace is the most useful
        # artifact for debugging a gate regression.
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cas-adapter-trace
          path: cas-adapter-trace
          if-no-files-found: warn
