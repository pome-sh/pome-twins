name: cli-version-gate
on:
  pull_request:
    paths:
      - 'cli/src/**'
      - 'cli/package.json'
      - 'cli/.changeset/**'
      - 'scripts/check-cli-version-bump.sh'
      - '.github/workflows/cli-version-gate.yml'

concurrency:
  group: cli-version-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    # NB: keep this job name stable — GitHub matches required status checks by
    # check-run name, so renaming it silently unbinds the gate from any branch
    # protection that lists the old name.
    name: cli/src/** must bump version or add a changeset
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - run: BASE_REF="origin/${{ github.event.pull_request.base.ref }}" scripts/check-cli-version-bump.sh
