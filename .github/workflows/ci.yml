name: ci
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  typecheck-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10
      - run: bun install --frozen-lockfile
      - run: bun run --filter '*' typecheck
      - run: bun run --filter '*' test
      - run: cd packages/twin-github && bun run test:coverage
      # Twin Fidelity Watch (tools/fidelity) moved to pome-cloud
      # (packages/fidelity-watch) — it owns status.pome.sh now.

  lint-no-cloud-imports:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: bash scripts/lint-no-cloud-imports.sh
