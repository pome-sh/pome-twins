name: ci
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  typecheck-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13
      - run: node scripts/check-copy-markers.mjs
      - run: node scripts/lint-code-health.mjs
      - run: bun install --frozen-lockfile --filter '*'
      - run: bun run lint:dead-code
      # F-692 / D9 — one repo-wide capture-only gate, scanning cli/src/**,
      # cli/scripts/**, and packages/** (cli-ci.yml's former duplicate step
      # was folded in here).
      - run: bun run gate:no-eval
      - run: bun run --filter '@pome-sh/shared-types' check:trace-contract
      # Consumers import sibling packages through their published `exports`
      # (e.g. `@pome-sh/sdk/server` → dist/server.d.ts). Build the workspace in
      # dependency order so those subpaths resolve before typecheck/test.
      - run: bun run --filter '*' build
      - run: bun run --filter '*' typecheck
      - run: bun run --filter '*' test
      - run: cd packages/twin-github && bun run test:coverage
      # Twin Fidelity Watch (tools/fidelity) moved to pome-cloud
      # (packages/fidelity-watch) — it owns status.pome.sh now.

  lint-no-cloud-imports:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: bash scripts/lint-no-cloud-imports.sh

  # Black-box twin runtime-contract suite (FDRS-711). Spawns the BUILT twins
  # via plain `node` — Node 24 to match the GHCR runtime image — and asserts
  # the control-plane surface frozen in CONTRACT.md.
  contract:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
      - run: bun install --frozen-lockfile --filter '*'
      # Build sibling packages so `@pome-sh/sdk/server` (dist) resolves when the
      # contract runner builds and boots the twins.
      - run: bun run --filter '*' build
      - run: bun run test:contract
