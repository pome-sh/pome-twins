name: ci
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  typecheck-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13
      - run: node scripts/check-redaction-mirrors.mjs
      - run: node scripts/check-admin-gate-mirrors.mjs
      - run: node scripts/check-copy-markers.mjs
      - run: node scripts/lint-code-health.mjs
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: bun run lint:dead-code
      - run: bun run --filter '*' typecheck
      - run: bun run --filter '*' test
      - run: cd packages/twin-github && bun run test:coverage
      # Twin Fidelity Watch (tools/fidelity) moved to pome-cloud
      # (packages/fidelity-watch) — it owns status.pome.sh now.

  lint-no-cloud-imports:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: bash scripts/lint-no-cloud-imports.sh
