name: twin-github image
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    paths:
      - 'packages/twin-github/**'
      - 'packages/shared-types/**'
      - '.github/workflows/twin-github-image.yml'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        id: meta
        with:
          # One shared package, one image per twin distinguished by tag
          # prefix: ghcr.io/pome-sh/twins:github (rolling), :github-<version>,
          # :github-<sha>. `latest=false` — a single `latest` can't span three
          # twins in one package.
          images: ghcr.io/pome-sh/twins
          flavor: |
            latest=false
          tags: |
            type=raw,value=github,enable={{is_default_branch}}
            type=semver,pattern=github-{{version}}
            type=semver,pattern=github-v{{version}}
            type=sha,prefix=github-,format=short
      - uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        id: build
        with:
          context: packages/twin-github
          # Expose shared-types as a named build context so the
          # twin-github Dockerfile can vendor it in before bun install.
          # `@pome-sh/shared-types` is a `workspace:*` dep that bun
          # cannot resolve from a single-package Docker context; the
          # Dockerfile rewrites the dep to `file:./vendor/shared-types`
          # at build time. See packages/twin-github/Dockerfile.
          build-contexts: |
            shared-types=packages/shared-types
          # PR builds verify the Dockerfile compiles but never push to
          # GHCR — only main / tag pushes publish. Without this gate
          # the GITHUB_TOKEN from a fork or unauthorized actor could
          # poison the image. `github.event_name` is the PR vs push
          # signal that survives merge-queue retargeting.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
