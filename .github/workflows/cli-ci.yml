name: cli-ci
on:
  pull_request:
    paths:
      - 'cli/**'
      - 'packages/twin-github/**'
      - 'packages/twin-slack/**'
      - 'packages/twin-stripe/**'
      - '.github/workflows/cli-ci.yml'
  push:
    branches: [main]
    paths:
      - 'cli/**'
      - 'packages/twin-github/**'
      - 'packages/twin-slack/**'
      - 'packages/twin-stripe/**'
      - '.github/workflows/cli-ci.yml'
  workflow_dispatch:

concurrency:
  group: cli-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: ubuntu-latest · Node 22
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13
      # FDRS-652/658 — Node 22, not 20. `bun install` builds better-sqlite3,
      # whose install falls through to `node-gyp@latest`; that node-gyp bundles
      # an undici needing `webidl.util.markAsUncloneable`, absent from Node 20's
      # runtime (crashes with a TypeError). Node 22 has the API, so the native
      # build succeeds.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - run: node scripts/verify-vendor.mjs
      # FDRS-657 — fail fast if local evaluation (scoring / judge / correlator)
      # is reintroduced into the capture-only OSS CLI.
      - run: node scripts/no-eval-in-oss.mjs
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: bun run typecheck
      - run: bun run build
      - run: bun run test
