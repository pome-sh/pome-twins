name: cli-ci
on:
  pull_request:
    paths:
      - 'cli/**'
      - 'packages/shared-types/**'
      - 'packages/sdk/**'
      - 'packages/twin-github/**'
      - 'packages/twin-slack/**'
      - 'packages/twin-stripe/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/pack-publishable.mjs'
      - 'scripts/use-local-pome-tarballs.mjs'
      - '.github/workflows/cli-ci.yml'
  push:
    branches: [main]
    paths:
      - 'cli/**'
      - 'packages/shared-types/**'
      - 'packages/sdk/**'
      - 'packages/twin-github/**'
      - 'packages/twin-slack/**'
      - 'packages/twin-stripe/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/pack-publishable.mjs'
      - 'scripts/use-local-pome-tarballs.mjs'
      - '.github/workflows/cli-ci.yml'
  workflow_dispatch:

concurrency:
  group: cli-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: ubuntu-latest · Node 24
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # FDRS-652/658 — Node 24, not 20. `npm ci` builds better-sqlite3,
      # whose install falls through to `node-gyp@latest`; that node-gyp bundles
      # an undici needing `webidl.util.markAsUncloneable`, absent from Node 20's
      # runtime (crashes with a TypeError). Node 24 has the API, so the native
      # build succeeds.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      # F-692 / D9 — the no-eval-in-oss gate now runs ONCE, repo-wide, in
      # ci.yml's typecheck-test job (npm run gate:no-eval); this duplicate
      # cli-scoped step was folded in there.
      - name: Build local @pome-sh package tarballs
        working-directory: ${{ github.workspace }}
        run: |
          npm ci
          node scripts/pack-publishable.mjs --out "$RUNNER_TEMP/tarballs"
      - name: Use local package tarballs before first npm publish
        working-directory: ${{ github.workspace }}
        run: node scripts/use-local-pome-tarballs.mjs cli/package.json
      # CLI has no committed lockfile: @pome-sh/* packages are not yet on npm,
      # so CI rewrites deps to local tarballs, generates a lockfile from the
      # rewritten manifest, then freezes install with npm ci (same pattern as
      # the pre-publish npm flow). Commit cli/package-lock.json after first
      # @pome-sh/* publish and switch to committed-lock npm ci.
      - run: |
          npm install --package-lock-only
          npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      # Former cli-publish-smoke.yml — same tarball install, so pack/clean-room
      # checks reuse this job instead of a second npm ci + pack cycle.
      - name: npm publish --dry-run (packs the real tarball)
        run: npm publish --dry-run --ignore-scripts 2>&1 | tee "$RUNNER_TEMP/pack.log"
      - name: Pack and clean-room install
        run: |
          set -euo pipefail
          npm pack --ignore-scripts --pack-destination "$RUNNER_TEMP"
          tgz="$(ls "$RUNNER_TEMP"/pome-sh-*.tgz)"
          # The npm registry rejects tarballs with hard-link entries (E415).
          # Fail here rather than at publish time if any slip in.
          if tar -tvf "$tgz" | grep -qE '^h'; then
            echo "tarball contains hard links — npm registry would reject (E415):"
            tar -tvf "$tgz" | grep -E '^h'
            exit 1
          fi
          room="$(mktemp -d)"
          cd "$room"
          npm init -y >/dev/null 2>&1
          npm install "$tgz" --no-audit --no-fund --ignore-scripts
          # bin resolves and dist entry is present:
          test -f node_modules/pome-sh/dist/src/cli/main.js
          # bundled twins made it into the tarball:
          for t in shared-types twin-github twin-slack twin-stripe; do
            ls node_modules/pome-sh/node_modules/@pome-sh/$t/package.json \
              || { echo "MISSING bundled @pome-sh/$t in published tarball"; exit 1; }
          done
          echo "clean-room OK: bin + dist + bundled twins present"
