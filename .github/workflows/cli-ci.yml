name: cli-ci
on:
  pull_request:
    paths:
      - 'cli/**'
      - 'packages/shared-types/**'
      - 'packages/sdk/**'
      - 'packages/twin-github/**'
      - 'packages/twin-slack/**'
      - 'packages/twin-stripe/**'
      - 'scripts/pack-publishable.mjs'
      - '.github/workflows/cli-ci.yml'
  push:
    branches: [main]
    paths:
      - 'cli/**'
      - 'packages/shared-types/**'
      - 'packages/sdk/**'
      - 'packages/twin-github/**'
      - 'packages/twin-slack/**'
      - 'packages/twin-stripe/**'
      - 'scripts/pack-publishable.mjs'
      - '.github/workflows/cli-ci.yml'
  workflow_dispatch:

concurrency:
  group: cli-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: ubuntu-latest · Node 24
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13
      # FDRS-652/658 — Node 24, not 20. `bun install` builds better-sqlite3,
      # whose install falls through to `node-gyp@latest`; that node-gyp bundles
      # an undici needing `webidl.util.markAsUncloneable`, absent from Node 20's
      # runtime (crashes with a TypeError). Node 24 has the API, so the native
      # build succeeds.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      # F-692 / D9 — the no-eval-in-oss gate now runs ONCE, repo-wide, in
      # ci.yml's typecheck-test job (bun run gate:no-eval); this duplicate
      # cli-scoped step was folded in there.
      - name: Build local @pome-sh package tarballs
        working-directory: ${{ github.workspace }}
        run: |
          bun install --frozen-lockfile --filter '*'
          node scripts/pack-publishable.mjs --out "$RUNNER_TEMP/tarballs"
      - name: Use local package tarballs before first npm publish
        working-directory: ${{ github.workspace }}
        run: node scripts/use-local-pome-tarballs.mjs cli/package.json
      - run: bun install
      - run: bun run typecheck
      - run: bun run build
      - run: bun run test
