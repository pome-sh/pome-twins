name: sdk publish
on:
  release:
    types: [published]

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'sdk-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: bun install --frozen-lockfile
      - run: bun run --filter '@pome-sh/sdk' typecheck
      - run: bun run --filter '@pome-sh/sdk' test
      - run: bun run --filter '@pome-sh/sdk' build
      # `npm publish` is intentionally NOT invoked. Per option-A decision
      # (2026-05-07), `@pome-sh/sdk` does not flip to npm until OSS Launch
      # Stage 1 lifts the npm-hold. This workflow exercises the publish
      # gates (typecheck, test, build) on every `sdk-v*` tag so the publish
      # pipeline is wired and rehearsed; the actual `npm publish` step lands
      # in a follow-up PR alongside the Stage 1 cutover.
      - name: npm publish (DRY RUN — held until Stage 1)
        working-directory: packages/sdk
        run: |
          echo "@pome-sh/sdk publish is held until OSS Launch Stage 1."
          echo "Tag: ${{ github.event.release.tag_name }}"
          echo "Skipping 'npm publish'."
