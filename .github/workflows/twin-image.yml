name: twin image
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    paths:
      - 'packages/twin-github/**'
      - 'packages/twin-gmail/**'
      - 'packages/twin-linear/**'
      - 'packages/twin-slack/**'
      - 'packages/twin-stripe/**'
      - 'packages/shared-types/**'
      - 'packages/*/package.json'
      - 'package.json'
      - 'package-lock.json'
      - '.dockerignore'
      - '.trivyignore'
      - 'scripts/ci/wait-for-workflow.sh'
      - 'scripts/ci/wait-for-workflow.test.mjs'
      - 'scripts/ci/sign-image-digests.sh'
      - '.github/workflows/ci.yml'
      - '.github/workflows/secret-scan.yml'
      - '.github/workflows/twin-image.yml'
  workflow_dispatch:

jobs:
  # On PRs, build only twins whose package tree (or shared runtime inputs)
  # changed. main/tags/dispatch always build the full matrix so GHCR stays
  # coherent. Shared-types / lockfiles / Docker wiring ⇒ all twins.
  #
  # FIRST_PARTY_TWINS: github, slack, stripe, gmail, linear
  detect-twins:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      twins: ${{ steps.detect.outputs.twins }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Select twin matrix
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          all='["github","slack","stripe","gmail","linear"]'
          if [[ "${EVENT_NAME}" != "pull_request" ]]; then
            echo "twins=${all}" >> "$GITHUB_OUTPUT"
            echo "Full twin matrix (non-PR event)."
            exit 0
          fi
          mapfile -t files < <(git diff --name-only "${BASE_SHA}" HEAD)
          shared=false
          for f in "${files[@]}"; do
            case "$f" in
              packages/shared-types/*|package.json|package-lock.json|.dockerignore|.trivyignore|scripts/ci/*|.github/workflows/*|packages/*/package.json)
                shared=true
                break
                ;;
            esac
          done
          if [[ "${shared}" == "true" ]]; then
            echo "twins=${all}" >> "$GITHUB_OUTPUT"
            echo "Full twin matrix (shared runtime / workflow inputs changed)."
            exit 0
          fi
          selected=()
          for twin in github slack stripe gmail linear; do
            for f in "${files[@]}"; do
              if [[ "$f" == packages/twin-${twin}/* ]]; then
                selected+=("\"${twin}\"")
                break
              fi
            done
          done
          if [[ "${#selected[@]}" -eq 0 ]]; then
            # Path filter admitted the PR but no twin package matched — keep
            # wait-gates meaningful with a full verify.
            echo "twins=${all}" >> "$GITHUB_OUTPUT"
            echo "Full twin matrix (fallback)."
            exit 0
          fi
          printf -v joined '%s,' "${selected[@]}"
          echo "twins=[${joined%,}]" >> "$GITHUB_OUTPUT"
          echo "PR twin matrix: [${joined%,}]"

  # Package typecheck/test live in `ci`; secret scanning is a parallel required
  # gate. Wait for both on this SHA before building/scanning/pushing so a red
  # twin cannot still ship a rolling tag to GHCR (FDRS-586 / F-696).
  wait-gates:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Wait for ci + secret-scan workflows on this SHA
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # PRs use the merge commit as github.sha; workflow runs are keyed by the
        # head SHA. Passed as an argument — the runner silently ignores env:
        # overrides of default GITHUB_* variables, so an `env: GITHUB_SHA:`
        # form waits on the merge SHA forever and times out on every PR.
        run: |
          set -euo pipefail
          sha="${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}"
          bash scripts/ci/wait-for-workflow.sh ci.yml "$sha"
          bash scripts/ci/wait-for-workflow.sh secret-scan.yml "$sha"

  publish:
    name: ${{ matrix.twin }}
    needs: [wait-gates, detect-twins]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        twin: ${{ fromJSON(needs.detect-twins.outputs.twins) }}
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        id: meta
        with:
          # One shared package, one image per twin distinguished by tag
          # prefix: ghcr.io/pome-sh/twins:<twin> (rolling), :<twin>-<version>,
          # :<twin>-<sha>. `latest=false` — a single `latest` can't span three
          # twins in one package.
          images: ghcr.io/pome-sh/twins
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ matrix.twin }},enable={{is_default_branch}}
            type=semver,pattern=${{ matrix.twin }}-{{version}}
            type=semver,pattern=${{ matrix.twin }}-v{{version}}
            type=sha,prefix=${{ matrix.twin }}-,format=short
      # /healthz reports these via the Dockerfiles' GIT_SHA/BUILD_TIME args;
      # without them every published image says git_sha:"dev".
      - name: Resolve build provenance
        id: buildinfo
        run: echo "time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      # Build once and load into the local daemon so Trivy can scan the exact
      # image before it is pushed. Also tag it locally for the scan ref.
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        id: build
        with:
          context: .
          file: packages/twin-${{ matrix.twin }}/Dockerfile
          load: true
          push: false
          tags: |
            ${{ steps.meta.outputs.tags }}
            twin-${{ matrix.twin }}:scan
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          build-args: |
            GIT_SHA=${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
            BUILD_TIME=${{ steps.buildinfo.outputs.time }}
      # Fail the publish on fixable HIGH/CRITICAL CVEs. `ignore-unfixed` drops
      # vulns with no upstream fix (nothing actionable); documented, reviewed
      # exceptions go in `.trivyignore` at the repo root.
      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: twin-${{ matrix.twin }}:scan
          format: table
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: .trivyignore
      - name: Generate image SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: twin-${{ matrix.twin }}:scan
          format: spdx-json
          output-file: twin-${{ matrix.twin }}.spdx.json
          upload-artifact: true
      # cosign v2. The v3.0.6 bump (attempted RFC3161-timestamped signatures)
      # was reverted: it gave no benefit — the pome-cloud deploy gate hard-gates
      # only the image SIGNATURE, which verifies on un-timestamped v2 signatures
      # too because the hashedrekord Rekor SET anchors the expired Fulcio cert
      # (the SPDX attestation is best-effort there, ADR-016 decision #4). And
      # cosign v3 `attest --type spdx` rejected the anchore SBOM predicate
      # ("invalid attestation: decoding json"), failing the sign step on every
      # v3 run and producing NO attestation. v2 signs + attests cleanly.
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        if: ${{ github.event_name != 'pull_request' }}
      # Push the EXACT image built + scanned above (already loaded into the local
      # daemon under every steps.meta.outputs.tags) — no second build, so the
      # published artifact is byte-identical to the one Trivy scanned. PR builds
      # verify + scan but never push; only main / tag pushes publish. Without
      # this gate the GITHUB_TOKEN from a fork or unauthorized actor could poison
      # the image. `github.event_name` is the PR-vs-push signal that survives
      # merge-queue retargeting.
      - name: Push scanned image
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          printf '%s\n' "${{ steps.meta.outputs.tags }}" | while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            echo "pushing $tag"
            docker push "$tag"
          done
      - name: Sign pushed image digests and attest SBOM
        id: sign
        if: ${{ github.event_name != 'pull_request' }}
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          bash scripts/ci/sign-image-digests.sh "Signed twin-${{ matrix.twin }} image digests" twin-${{ matrix.twin }}.spdx.json
